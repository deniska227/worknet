<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход</title>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  color: #fff;
  background-image: url("https://img.magnific.com/free-vector/gradient-blue-background_23-2149331354.jpg?semt=ais_hybrid&w=740&q=80");
  background-size: cover;
  background-position: center;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at top, rgba(56,189,248,0.15), transparent 40%),
              rgba(0,0,0,0.75);
  backdrop-filter: blur(12px);
  z-index: -1;
}


.form-container {
  width: 360px;
  padding: 30px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 20px;
  backdrop-filter: blur(18px);
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
}


.logo {
  width: 70px;
  margin-bottom: 15px;
  filter: drop-shadow(0 0 10px rgba(56,189,248,0.4));
}


h2 {
  margin-bottom: 20px;
  font-size: 26px;
  color: #38bdf8;
}

.input-group {
  position: relative;
  margin-bottom: 12px;
}

.input-group input {
  width: 100%;
  padding: 12px 40px;
  border-radius: 12px;
  border: none;
  outline: none;
  background: rgba(255,255,255,0.06);
  color: #fff;
  transition: 0.2s;
}

.input-group input:focus {
  background: rgba(56,189,248,0.12);
  border: 1px solid rgba(56,189,248,0.4);
}

.input-group i {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  opacity: 0.7;
}

.toggle-password {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  opacity: 0.7;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  background: #38bdf8;
  color: #0b1220;
  border: none;
  border-radius: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #0ea5e9;
  transform: scale(1.03);
}

p {
  margin-top: 15px;
  font-size: 13px;
  color: #cbd5e1;
}

a {
  color: #38bdf8;
  text-decoration: none;
}

a:hover {
  text-decoration: underline;
}


.validation {
  text-align: left;
  margin-top: 10px;
  display: none;
}

.valid {
  color: #22c55e;
  font-size: 12px;
}

.invalid {
  color: #ef4444;
  font-size: 12px;
}
</style>

    <link rel="stylesheet" href="css/style.css">

    <script src="https://kit.fontawesome.com/yourcode.js" crossorigin="anonymous"></script>
</head>
<body>

<div class="form-container">

    <h2>Вход</h2>

    <div class="input-group">
        <input type="text" id="login" placeholder="Логин">
    </div>

    <div class="input-group">
        <input type="password" id="password" placeholder="Пароль">
        <span class="toggle-password" onclick="togglePassword()"></span>
    </div>

    <button onclick="login()">Войти</button>

    <p>Нет аккаунта? <a href="register.html">Регистрация</a></p>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://nssrxeefdvxsoxdipkau.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5zc3J4ZWVmZHZ4c294ZGlwa2F1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwNjg4NjksImV4cCI6MjA5MzY0NDg2OX0.xYVpCFCa41AdsNyw7kX8N_0Gszkcc00dXUlyZ5nKhwY";

const supabaseClient = window.supabase.createClient(
    supabaseUrl,
    supabaseKey
);

function togglePassword() {
    const pass = document.getElementById("password");

    pass.type = pass.type === "password"
        ? "text"
        : "password";
}

async function login() {

    const loginValue = document.getElementById("login").value.trim();
    const passValue = document.getElementById("password").value.trim();

    if (!loginValue || !passValue) {
        alert("Заполните поля");
        return;
    }

    const { data, error } = await supabaseClient
        .from("registr")
        .select("*")
        .eq("login", loginValue)
        .eq("password", passValue)
        .single();

    if (error || !data) {
        alert("Неверный логин или пароль");
        console.log(error);
        return;
    }

    localStorage.setItem("auth", "true");
    localStorage.setItem("user", JSON.stringify(data));

    alert("Успешный вход!");

    window.location.href = "index.html";
}
</script>

</body>
</html>
