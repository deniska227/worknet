<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход</title>
    <link rel="stylesheet" href="css/style.css">

    <script src="https://kit.fontawesome.com/yourcode.js" crossorigin="anonymous"></script>
</head>
<body>

<div class="form-container">

    <h2>Вход</h2>

    <div class="input-group">
        <input type="text" id="login" placeholder="Логин">
    </div>

    <div class="input-group">
        <input type="password" id="password" placeholder="Пароль">
        <span class="toggle-password" onclick="togglePassword()"></span>
    </div>

    <button onclick="login()">Войти</button>

    <p>Нет аккаунта? <a href="register.html">Регистрация</a></p>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://nssrxeefdvxsoxdipkau.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5zc3J4ZWVmZHZ4c294ZGlwa2F1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwNjg4NjksImV4cCI6MjA5MzY0NDg2OX0.xYVpCFCa41AdsNyw7kX8N_0Gszkcc00dXUlyZ5nKhwY";

const supabaseClient = window.supabase.createClient(
    supabaseUrl,
    supabaseKey
);

function togglePassword() {
    const pass = document.getElementById("password");

    pass.type = pass.type === "password"
        ? "text"
        : "password";
}

async function login() {

    const loginValue = document.getElementById("login").value.trim();
    const passValue = document.getElementById("password").value.trim();

    if (!loginValue || !passValue) {
        alert("Заполните поля");
        return;
    }

    const { data, error } = await supabaseClient
        .from("registr")
        .select("*")
        .eq("login", loginValue)
        .eq("password", passValue)
        .single();

    if (error || !data) {
        alert("Неверный логин или пароль");
        console.log(error);
        return;
    }

    localStorage.setItem("auth", "true");
    localStorage.setItem("user", JSON.stringify(data));

    alert("Успешный вход!");

    window.location.href = "index.html";
}
</script>

</body>
</html>
