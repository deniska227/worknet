<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  color: #fff;
  background-image: url("https://img.magnific.com/free-vector/gradient-blue-background_23-2149331354.jpg?semt=ais_hybrid&w=740&q=80");
  background-size: cover;
  background-position: center;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at top, rgba(56,189,248,0.15), transparent 40%),
              rgba(0,0,0,0.75);
  backdrop-filter: blur(12px);
  z-index: -1;
}


.form-container {
  width: 360px;
  padding: 30px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 20px;
  backdrop-filter: blur(18px);
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
}


.logo {
  width: 70px;
  margin-bottom: 15px;
  filter: drop-shadow(0 0 10px rgba(56,189,248,0.4));
}


h2 {
  margin-bottom: 20px;
  font-size: 26px;
  color: #38bdf8;
}

.input-group {
  position: relative;
  margin-bottom: 12px;
}

.input-group input {
  width: 100%;
  padding: 12px 40px;
  border-radius: 12px;
  border: none;
  outline: none;
  background: rgba(255,255,255,0.06);
  color: #fff;
  transition: 0.2s;
}

.input-group input:focus {
  background: rgba(56,189,248,0.12);
  border: 1px solid rgba(56,189,248,0.4);
}

.input-group i {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  opacity: 0.7;
}

.toggle-password {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  opacity: 0.7;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  background: #38bdf8;
  color: #0b1220;
  border: none;
  border-radius: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #0ea5e9;
  transform: scale(1.03);
}

p {
  margin-top: 15px;
  font-size: 13px;
  color: #cbd5e1;
}

a {
  color: #38bdf8;
  text-decoration: none;
}

a:hover {
  text-decoration: underline;
}


.validation {
  text-align: left;
  margin-top: 10px;
  display: none;
}

.valid {
  color: #22c55e;
  font-size: 12px;
}

.invalid {
  color: #ef4444;
  font-size: 12px;
}
</style>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="form-container">

    <img src="https://i.yapx.ru/dioSB.png" class="logo">

    <h2>Регистрация</h2>

    <form id="registerForm">

        <div class="input-group">
            <input type="text" id="login" placeholder="Логин" required>
        </div>

        <div class="input-group">
            <input type="email" id="email" placeholder="Email" required>
        </div>

        <div class="input-group">
            <input type="password" id="pass1" placeholder="Пароль" required>
        </div>

        <div class="input-group">
            <input type="password" id="pass2" placeholder="Повторите пароль" required>
        </div>

        <div class="validation" id="validation" style="display:none;">
            <div id="length" class="invalid">минимум 6 символов</div>
            <div id="letter" class="invalid">буквы</div>
            <div id="number" class="invalid">цифры</div>
        </div>

        <button type="submit">Создать аккаунт</button>

    </form>

    <p>Уже есть аккаунт? <a href="login.html">Войти</a></p>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://nssrxeefdvxsoxdipkau.supabase.co";
const supabaseKey = "sb_publishable_9timKwMVgkmSJxlmKblINw_PVvAnSHD";

const supabaseClient =
    window.supabase?.createClient?.(supabaseUrl, supabaseKey);


if (!supabaseClient) {
    console.error("Supabase не загрузился");
}


const form = document.getElementById("registerForm");
const pass1 = document.getElementById("pass1");
const validation = document.getElementById("validation");

pass1.addEventListener("input", () => {
    validation.style.display = "block";

    const v = pass1.value;

    document.getElementById("length").className =
        v.length >= 6 ? "valid" : "invalid";

    document.getElementById("letter").className =
        /[a-zA-Z]/.test(v) ? "valid" : "invalid";

    document.getElementById("number").className =
        /[0-9]/.test(v) ? "valid" : "invalid";
});


form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const login = document.getElementById("login").value.trim();
    const email = document.getElementById("email").value.trim();
    const p1 = pass1.value;
    const p2 = document.getElementById("pass2").value;

    if (!supabaseClient) {
        alert("Ошибка подключения к базе");
        return;
    }

    if (p1 !== p2) {
        alert("Пароли не совпадают");
        return;
    }

    if (p1.length < 6) {
        alert("Пароль слишком короткий");
        return;
    }

    const { data, error } = await supabaseClient
        .from("registr")
        .insert([
            {
  login,
  email,
  password: p1
}
        ]);

    console.log("DATA:", data);
    console.log("ERROR:", error);

    if (error) {
        alert("Ошибка регистрации — смотри консоль");
        return;
    }

    localStorage.setItem("auth", "true");
    localStorage.setItem("user", login);

    alert("Аккаунт создан!");
    window.location.href = "index.html";
});
</script>

</body>
</html>
