<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Профиль</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

* { margin:0; padding:0; box-sizing:border-box; font-family:'Inter', sans-serif; }

body {
  color:#fff;
  background: radial-gradient(circle at top, #0f172a, #020617);
  background-size:cover;
  background-attachment:fixed;
  padding-top: 120px;
}

body::before {
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 20%, rgba(56,189,248,0.15), transparent 40%),
    radial-gradient(circle at 80% 30%, rgba(99,102,241,0.12), transparent 45%),
    radial-gradient(circle at 50% 90%, rgba(34,197,94,0.08), transparent 50%),
    rgba(0,0,0,0.75);
  backdrop-filter: blur(10px);
  z-index:-1;
}

header {
  display:flex;
  justify-content:space-between;
  padding:18px 70px;
  background:rgba(255,255,255,0.04);
  backdrop-filter:blur(16px);
}

.logo {
  display: flex;
  align-items: center;
  gap: 14px;
}

.logo-icon {
  width: 54px;
  height: 54px;

  border-radius: 18px;

  display: flex;
  align-items: center;
  justify-content: center;

  background: linear-gradient(135deg, #38bdf8, #0ea5e9);

  color: #0b1220;

  font-size: 24px;
  font-weight: 800;

  box-shadow: 0 10px 30px rgba(56,189,248,0.35);
}
.logo-text h2 {
  font-size: 20px;
  color: #fff;
  margin-bottom: 2px;
}

.logo-text span {
  font-size: 13px;
  color: #94a3b8;
}
.navbar {
  display: flex;
  gap: 12px;
}

.navbar a {
  padding: 12px 16px;

  border-radius: 14px;

  color: #cbd5e1;
  text-decoration: none;

  font-size: 14px;

  transition: 0.25s;
}

.navbar a:hover {
  background: rgba(255,255,255,0.05);
  color: #fff;
  transform: translateY(-2px);
}

.navbar a.active {
  background: rgba(56,189,248,0.12);
  color: #38bdf8;
  border: 1px solid rgba(56,189,248,0.18);
}

/* PROFILE */
.profile {
  max-width:1100px;
  margin:50px auto;
  padding:30px;
}

.profile-top {
  display:flex;
  gap:30px;
  align-items:center;
  background:rgba(255,255,255,0.05);
  padding:30px;
  border-radius:20px;
  border:1px solid rgba(255,255,255,0.08);
    position: relative;
  overflow: hidden;
}
.profile-grid{
  align-items: start;
}
.profile-top::before{
  content:"";
  position:absolute;
  width:500px;
  height:500px;
  background:#38bdf8;
  filter:blur(140px);
  opacity:.15;
  top:-200px;
  right:-100px;
}

.avatar {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 40px;
  color: #0b1220;
  background: linear-gradient(135deg, #38bdf8, #0ea5e9);
  border: 3px solid rgba(255,255,255,0.15);
  box-shadow: 0 0 25px rgba(56,189,248,0.35);
  user-select: none;
}

.avatar:hover{
  transform:scale(1.05);
}

/* STATUS */
.status {
  position:absolute;
  bottom:5px;
  right:5px;
  width:18px;
  height:18px;
  border-radius:50%;
  border:2px solid #000;
}

.online { background:#22c55e; }
.offline { background:#64748b; }

.profile-info h2 { font-size:28px; }

.rating {
  margin:8px 0;
  color:#38bdf8;
}

.stats {
  display:flex;
  gap:20px;
  margin-top:10px;
}

.stat {
  background:rgba(255,255,255,0.05);
  padding:10px 14px;
  border-radius:12px;
  font-size:14px;
}

.btn{
  background:linear-gradient(
  135deg,
  #38bdf8,
  #0ea5e9
  );

  color:white;
  font-weight:600;

  padding:12px 18px;

  border-radius:14px;

  transition:.25s;
}

.btn:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 25px rgba(56,189,248,.35);
}

/* GRID */
.profile-grid {
  margin-top: 30px;
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 20px;
  align-items: start;
}

.block{
  background:
  linear-gradient(
  180deg,
  rgba(255,255,255,.07),
  rgba(255,255,255,.03)
  );
  border:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(14px);
  border-radius:24px;
  padding:24px;
  box-shadow:
  0 10px 40px rgba(0,0,0,.25);
}

/* PORTFOLIO */
.portfolio-item{
  height:180px;
  border-radius:18px;
  overflow:hidden;
  position:relative;
  transition:.35s;
}

.portfolio-item::after{
  content:"Открыть";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.45);
  display:flex;
  justify-content:center;
  align-items:center;
  opacity:0;
  transition:.3s;
  font-weight:600;
  letter-spacing:.5px;
}

.portfolio-item:hover{
  transform:translateY(-6px) scale(1.03);
}

.portfolio-item:hover::after{
  opacity:1;
}

/* REVIEWS */
.review {
  margin-bottom:12px;
  padding:10px;
  border-radius:10px;
  background:rgba(255,255,255,0.04);
}

.review span {
  color:#38bdf8;
  font-size:13px;
}

input {
  margin-top:10px;
  padding:8px;
  border-radius:10px;
  border:none;
  outline:none;
}

/* MOBILE */
@media(max-width:900px){
  .profile-grid { grid-template-columns:1fr; }
  .portfolio-grid { grid-template-columns:1fr 1fr; }
  .profile-top { flex-direction:column; text-align:center; }
}
.upload-btn {
  display:inline-block;
  padding:10px 14px;
  background: rgba(56,189,248,0.2);
  border:1px solid rgba(56,189,248,0.5);
  border-radius:12px;
  cursor:pointer;
  transition:0.2s;
  font-size:14px;
}

.upload-btn:hover {
  background:#38bdf8;
  color:#0b1220;
}

.portfolio-top {
  margin: 10px 0 15px;
}
.viewer {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 999;
}

.viewer img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 20px;
}
.menu-wrap {
  position: absolute;
  top: 20px;
  right: 20px;
}

#menuBtn {
  cursor: pointer;
  font-size: 20px;
}

.menu {
  display: none;
  position: absolute;
  right: 0;
  top: 30px;
  background: rgba(0,0,0,0.92);
  padding: 14px;
  border-radius: 14px;
  width: 240px;              /* было 180px → стало шире */
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  backdrop-filter: blur(10px);
  z-index: 999;
}

.menu div {
  padding: 10px 12px;
  cursor: pointer;
  border-radius: 8px;
  font-size: 14px;
  color: #fff;
  white-space: nowrap;      /* чтобы не ломалось */
}

.menu div:hover {
  background: rgba(56,189,248,0.25);
}

.header {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);

  width: calc(100% - 80px);

  padding: 16px 26px;

  display: flex;
  align-items: center;
  justify-content: space-between;

  border-radius: 24px;

  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);

  backdrop-filter: blur(18px);

  z-index: 1000;
}

.portfolio-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.portfolio-item {
  height: 120px;
  border-radius: 12px;
  background-size: cover;
  background-position: center;
  position: relative;
  cursor: pointer;
  overflow: hidden;
}

.del {
  position: absolute;
  top: 5px;
  right: 5px;
  width: 22px;
  height: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.6);
  color: white;
  border-radius: 6px;
  font-size: 14px;
  cursor: pointer;
  z-index: 2;
}

.del:hover {
  background: red;
}
.profile-bg {
  position: absolute;
  width: 500px;
  height: 500px;
  background: #38bdf8;
  filter: blur(160px);
  opacity: 0.08;
  top: 100px;
  left: -200px;
}

</style>
</head>

<body>

<header class="header">

  <div class="logo">

    <div class="logo-icon">
      W
    </div>

    <div class="logo-text">
      <h2>WorkNet</h2>
      <span>Freelance Platform</span>
    </div>

  </div>

  <nav class="navbar">

    <a href="index.html">Главная</a>
    <a href="profile.html" class="active">Профиль</a>
    <a href="create-task.html">Заказы</a>
    <a href="support.html">Поддержка</a>

  </nav>

</header>

<div class="profile">


  <div class="profile-top">
    <input type="file" id="coverInput" hidden>

<div id="cover" class="cover"></div>

    <div class="avatar-wrap">
      <div id="avatar" class="avatar" title="Нажми чтобы сменить аватар"></div>
      <div id="status" class="status"></div>
      <input type="file" id="avatarInput" hidden>

    <div class="menu-wrap">

</div>
</div>

    <div class="profile-info">
      <div style="display:flex; align-items:center; gap:10px;">

</div>

<div id="nameModal" style="display:none; margin-top:10px;">
  <input type="text" id="nameInput" placeholder="Новое имя">
  <button class="btn" onclick="changeName()">Сохранить</button>
</div>

     <div class="rating" id="ratingBlock">
  ★★★★★ (0)
</div>

<div class="stats">
  <div class="stat" id="doneOrders">0 заказов</div>
  <div class="stat" id="earnedMoney">₸0 заработано</div>
  <div class="stat" id="statusText">Онлайн</div>
</div>

  </div>

  </div>
  <!-- GRID -->
  <div class="profile-grid">

    <!-- PORTFOLIO -->
    <div class="block">
  <h3>Портфолио</h3>

  <div class="portfolio-top">
    <label class="upload-btn">
      + Добавить работу
      <input type="file" id="portfolioInput" hidden>
    </label>
  </div>

  <div id="viewer" class="viewer">
    <img id="viewerImg">
  </div>

  <div class="portfolio-grid" id="portfolio"></div>
</div>

    <!-- INFO -->
   <div class="block">
  <h3>О себе</h3>

  <p id="bioText" style="color:#cbd5e1;font-size:14px;"></p>

  <textarea id="bioInput"
    maxlength="200"
    style="
      width:100%;
      margin-top:10px;
      padding:10px;
      border-radius:10px;
      border:none;
      outline:none;
      display:none;
      resize:none;
      height:80px;
    "
    placeholder="Расскажи о себе (до 200 символов)">
  </textarea>

  <div style="display:flex; gap:10px; margin-top:10px;">
    <button class="btn" id="editBioBtn">Редактировать</button>
    <button class="btn" id="saveBioBtn" style="display:none;">Сохранить</button>
  </div>
</div>

  </div>

  <!-- REVIEWS -->
  <div class="block" style="margin-top:20px;">
  <h3>Отзывы</h3>

  <div id="reviewsList"></div>

</div>

</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://nssrxeefdvxsoxdipkau.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5zc3J4ZWVmZHZ4c294ZGlwa2F1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwNjg4NjksImV4cCI6MjA5MzY0NDg2OX0.xYVpCFCa41AdsNyw7kX8N_0Gszkcc00dXUlyZ5nKhwY";

const supabaseClient = window.supabase.createClient(
  supabaseUrl,
  supabaseKey
);


let user;

try {
  user = JSON.parse(localStorage.getItem("user"));
} catch (e) {
  user = null;
}

if (!user || !user.login) {
  window.location.href = "register.html";
}

if (!user || !user.login) {
  window.location.href = "register.html";
}

console.log(user);

const avatarInput = document.getElementById("avatarInput");
const statusEl = document.getElementById("status");
const statusText = document.getElementById("statusText");
const nameEl = document.getElementById("name");
const nameModal = document.getElementById("nameModal");
const nameInput = document.getElementById("nameInput");

const portfolioEl = document.getElementById("portfolio");
const portfolioInput = document.getElementById("portfolioInput");

/* ===== LOAD USER ===== */
nameEl.innerText = user.login || "User";


const avatarEl = document.getElementById("avatar");


const name = (user.login || "U").charAt(0).toUpperCase();

avatarEl.innerHTML = name;
avatarEl.style.backgroundImage = "none";
avatarEl.style.display = "flex";
avatarEl.style.alignItems = "center";
avatarEl.style.justifyContent = "center";
avatarEl.style.fontSize = "42px";
avatarEl.style.fontWeight = "700";
avatarEl.style.color = "#0b1220";
avatarEl.style.background = "linear-gradient(135deg,#38bdf8,#0ea5e9)";

avatarEl.onclick = () => {
  avatarInput.click();
};




/* ===== PORTFOLIO LOAD ===== */
async function loadPortfolio() {
  const { data } = await supabaseClient
    .from("portfolio")
    .select("*")
    .eq("user_id", user.id);

  portfolioEl.innerHTML = "";

  (data || []).forEach(item => {
    const div = document.createElement("div");
    div.className = "portfolio-item";
    div.style.backgroundImage = `url(${item.image_url})`;

    portfolioEl.appendChild(div);
  });
}

loadPortfolio();

/* ===== PORTFOLIO UPLOAD ===== */
portfolioInput.onchange = async (e) => {
  const file = e.target.files[0];
  if (!file) return;

  const fileName = `${user.id}_${Date.now()}`;
  const filePath = fileName; //

  const { error: uploadError } = await supabaseClient.storage
    .from("portfolio")
    .upload(filePath, file);

  if (uploadError) {
    console.log("UPLOAD ERROR:", uploadError);
    return;
  }

  const { data } = supabaseClient.storage
    .from("portfolio")
    .getPublicUrl(filePath);

  const url = data.publicUrl;

  console.log("PORTFOLIO URL:", url);

  const { error: dbError } = await supabaseClient
    .from("portfolio")
    .insert({
      user_id: user.id,
      image_url: url
    });

  if (dbError) {
    console.log("DB ERROR:", dbError);
  }

  loadPortfolio();
};

window.logout = async function () {
  try {
  
    await supabaseClient
      .from("registr")
      .update({ is_online: false })
      .eq("id", user.id);

  } catch (e) {
    console.log("Ошибка обновления статуса:", e);
  }

  localStorage.removeItem("user");

  await supabaseClient.auth.signOut().catch(() => {});


  window.location.href = "register.html";
};

document.addEventListener("DOMContentLoaded", () => {
  const menuBtn = document.getElementById("menuBtn");
  const menu = document.getElementById("menu");

  menuBtn.onclick = (e) => {
    e.stopPropagation();
    menu.style.display = menu.style.display === "block" ? "none" : "block";
  };

  document.addEventListener("click", (e) => {
    if (!menu.contains(e.target) && !menuBtn.contains(e.target)) {
      menu.style.display = "none";
    }
  });
});

/* ===== PROFILE STATS ===== */

async function loadProfileStats(){

  /* completed orders */
  const { data: tasks } = await supabaseClient
    .from("tasks")
    .select("*")
    .eq("freelancer_id", user.id)
    .eq("status", "done");

  const doneCount = tasks?.length || 0;

  document.getElementById("doneOrders").innerText =
    doneCount + " заказов";

  /* earned money */
  let total = 0;

  tasks?.forEach(t => {
    total += Number(t.price || 0);
  });

  document.getElementById("earnedMoney").innerText =
    "₸" + total + " заработано";

  /* reviews */
  const { data: reviews } = await supabaseClient
    .from("reviews")
    .select("*")
    .eq("to_user", user.id);

  const reviewsList = document.getElementById("reviewsList");

  reviewsList.innerHTML = "";

  if(!reviews?.length){

    reviewsList.innerHTML = `
      <div style="color:#94a3b8;">
        Пока нет отзывов
      </div>
    `;

    return;
  }

  let avg = 0;

  reviews.forEach(r => {
    avg += Number(r.stars);

    reviewsList.innerHTML += `
      <div class="review">
        <span>${"★".repeat(r.stars)}</span>
        <p>${r.text}</p>
      </div>
    `;
  });

  avg = (avg / reviews.length).toFixed(1);

  document.getElementById("ratingBlock").innerHTML =
    `★★★★★ (${avg})`;
}

loadProfileStats();
window.logout = async function () {
  try {
    await supabaseClient
      .from("registr")
      .update({ is_online: false })
      .eq("id", user.id);
  } catch (e) {
    console.log(e);
  }

  localStorage.removeItem("user");

  try {
    await supabaseClient.auth.signOut();
  } catch (e) {}

  window.location.href = "register.html";
};

document.addEventListener("DOMContentLoaded", () => {
  const menuBtn = document.getElementById("menuBtn");
  const menu = document.getElementById("menu");

  if (!menuBtn || !menu) return;

  menuBtn.onclick = (e) => {
    e.stopPropagation();
    menu.style.display = menu.style.display === "block" ? "none" : "block";
  };

  document.addEventListener("click", (e) => {
    if (!menu.contains(e.target) && !menuBtn.contains(e.target)) {
      menu.style.display = "none";
    }
  });
});

const bioText = document.getElementById("bioText");
const bioInput = document.getElementById("bioInput");
const editBioBtn = document.getElementById("editBioBtn");
const saveBioBtn = document.getElementById("saveBioBtn");

/* ===== LOAD BIO ===== */
bioText.innerText = user.bio || "Пользователь ещё ничего не рассказал о себе";

/* ===== EDIT MODE ===== */
editBioBtn.onclick = () => {
  bioInput.style.display = "block";
  saveBioBtn.style.display = "inline-block";
  editBioBtn.style.display = "none";

  bioInput.value = user.bio || "";
};

/* ===== SAVE BIO ===== */
saveBioBtn.onclick = async () => {
  const text = bioInput.value.trim();

  if (text.length > 200) {
    alert("Максимум 200 символов");
    return;
  }

  const { error } = await supabaseClient
    .from("registr")
    .update({ bio: text })
    .eq("id", user.id);

  if (error) {
    console.log(error);
    return;
  }

  user.bio = text;
  localStorage.setItem("user", JSON.stringify(user));

  bioText.innerText = text;

  bioInput.style.display = "none";
  saveBioBtn.style.display = "none";
  editBioBtn.style.display = "inline-block";
};
</script>

</body>
