<!DOCTYPE html>
<html lang="ru">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1"> 
<meta charset="UTF-8">
<title>Поддержка | WorkNet</title>

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  color: #fff;
  background-image: url("https://png.pngtree.com/thumb_back/fw800/background/20240616/pngtree-blue-business-background-image_15893112.jpg");
  background-size: cover;
  background-attachment: scroll;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(12px);
  z-index: -1;
}

header {
  padding: 18px 70px;
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(16px);
  display: flex;
  justify-content: space-between;
}

.logo {
  display: flex;
  align-items: center;
  gap: 14px;
}

.logo-icon {
  width: 54px;
  height: 54px;
  border-radius: 18px;

  display: flex;
  align-items: center;
  justify-content: center;

  background: linear-gradient(135deg, #38bdf8, #0ea5e9);
  color: #0b1220;

  font-size: 24px;
  font-weight: 800;

  box-shadow: 0 10px 30px rgba(56,189,248,0.35);
}

.logo-text h2 {
  font-size: 20px;
  color: #fff;
  margin: 0;
}

.logo-text span {
  color: #94a3b8;
  font-size: 13px;
}

.chat-box {
  max-width: 900px;
  margin: 60px auto;
  padding: 20px;
  background: rgba(255,255,255,0.04);
  border-radius: 20px;
  backdrop-filter: blur(14px);
  border: 1px solid rgba(255,255,255,0.06);

  display: flex;
  flex-direction: column;
  height: 70vh;
}


.messages {
  flex: 1;
  overflow-y: auto;
  padding: 15px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}


.msg {
  max-width: 65%;
  padding: 12px 14px;
  border-radius: 16px;
  font-size: 14px;
  line-height: 1.4;
  word-wrap: break-word;
}


.user {
  align-self: flex-end;
  background: linear-gradient(135deg, #38bdf8, #0ea5e9);
  color: #06121f;
  border-bottom-right-radius: 4px;
}


.ai {
  align-self: flex-start;
  background: rgba(255,255,255,0.06);
  color: #fff;
  border-bottom-left-radius: 4px;
}


.input-box {
  display: flex;
  margin-top: 12px;
  gap: 10px;
}

.input-box input {
  flex: 1;
  padding: 12px 14px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.06);
  color: #fff;
  outline: none;
}

.input-box button {
  padding: 12px 18px;
  border: none;
  border-radius: 12px;
  background: #38bdf8;
  cursor: pointer;
  font-weight: 600;
  transition: 0.2s;
}

.input-box button:hover {
  transform: scale(1.05);
}

button {
  padding: 12px 16px;
  border: none;
  background: #38bdf8;
  cursor: pointer;
  border-radius: 0 12px 12px 0;
}

.logout-btn{
  padding: 12px 22px;
  border: none;
  border-radius: 14px;
  background: linear-gradient(135deg,#3289fc,#2d9df8);
  color: white;
  font-weight: 600;
  cursor: pointer;
  transition: 0.3s;
}

.logout-btn:hover{
  transform: translateY(-2px);
  box-shadow: 0 10px 25px rgba(68, 122, 239, 0.35);
}
  
@media (max-width: 768px) {

  body {
    margin: 0;
    padding: 0;
  }

  header {
    padding: 12px 16px !important;
  }

  .chat-box {
    width: 100vw !important;
    height: calc(100vh - 70px) !important;
    margin: 0 !important;
    border-radius: 0 !important;
  }

  .messages {
    height: calc(100vh - 140px) !important;
  }

  .input-box {
    position: sticky;
    bottom: 0;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(10px);
  }

  input {
    font-size: 16px !important;
    padding: 14px !important;
  }

  button {
    padding: 14px 18px !important;
  }

}
</style>
</head>

<body>

<header>
  <div class="logo">

    <div class="logo-icon">
      W
    </div>

    <div class="logo-text">
      <h2>WorkNet</h2>
      <span>Служба поддержки</span>
    </div>

  </div>

  <button class="logout-btn" onclick="goBack()">
  ← Назад
</button>

</header>

<div class="chat-box">

  <div class="messages" id="chat"></div>

  <div class="input-box">
    <input id="input" placeholder="Напиши вопрос...">
    <button onclick="send()">➤</button>
  </div>

</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");

function addMsg(text, type){
  chat.innerHTML += `<div class="msg ${type}">${text}</div>`;
  chat.scrollTop = chat.scrollHeight;
}

async function ai(text){
  return "🤖 WorkNet AI: Я получил твой вопрос — \"" + text + "\". Скоро отвечу точнее.";
}

async function send(){
  const text = input.value;
  if(!text) return;

  addMsg(text, "user");
  input.value = "";

  const res = await ai(text);
  addMsg(res, "ai");
}

function goBack() {
  window.location.href = "index.html";
}
</script>

</body>
</html>
